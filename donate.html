<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mrrabyss</title>
    <link rel="icon" type="image/png" href="https://github.com/mrrabyss.png?size=64">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="hero">
        <div class="hero__frame">
            <span class="hero__corner hero__corner--tl" aria-hidden="true"></span>
            <span class="hero__corner hero__corner--tr" aria-hidden="true"></span>
            <span class="hero__corner hero__corner--bl" aria-hidden="true"></span>
            <span class="hero__corner hero__corner--br" aria-hidden="true"></span>
            <img class="hero__avatar" src="https://github.com/mrrabyss.png?size=200" width="120" height="120" alt="mrrabyss">
        </div>
        <h1 class="hero__title">mrrabyss</h1>
        <p class="hero__tagline">a programmer</p>
        <a class="guns-link" href="https://guns.lol/mrrabyss" target="_blank" rel="noopener noreferrer me" aria-label="mrrabyss on guns.lol — open bio page">
            <span class="guns-link__line">
                <span class="guns-link__brand">guns.lol</span><span class="guns-link__slash">/</span><span class="guns-link__user">mrrabyss</span>
            </span>
            <span class="guns-link__hint" aria-hidden="true">open bio page</span>
        </a>
    </header>
        
    <footer class="footer">
        <p class="footer__text">© <span id="year"></span> mrrabyss</p>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script defer src="main.js"></script>

</html>
